# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

# Only build main on push and PRs targeting main. Leaving `push` unfiltered
# meant a push to a branch that also had an open PR fired both the `push` and
# `pull_request` events, running the whole build twice for the same commit.
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 25
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven
    - name: Bootstrap CLAUDE.md enforcer rule
      # The custom enforcer rule (tools.claude-code-enforcer) is consumed as a
      # maven-enforcer-plugin dependency by the root build, so it must be
      # installed to the local repo first. The claude-md-enforce profile is
      # off here (no -DenforceClaudeMd), so the module is not asked to depend
      # on itself while it is being built.
      run: mvn -B -pl claude-code-enforcer -am install
    - name: Build with Maven
      # -DenforceClaudeMd activates the claude-md-enforce profile so the root
      # build fails when CLAUDE.md is missing or malformed. This is the only
      # workflow that runs the check.
      run: |
        start=$(date +%s)
        mvn -B package -DenforceClaudeMd --file pom.xml
        end=$(date +%s)
        duration=$((end - start))
        echo "Build took ${duration} seconds."
        if [ "${duration}" -gt 120 ]; then
          echo "::error::Build exceeded the 2 minute (120s) limit: ${duration}s"
          exit 1
        fi
