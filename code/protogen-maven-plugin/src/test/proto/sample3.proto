syntax = "proto2";

package tutorial;

option java_multiple_files = true;
option java_package = "io.github.adamw7.tools.code.protos";

enum Size {
  small = 0;
  medium = 1;
  big = 2;
}

message City {
  optional string zipcode = 1;
  optional string name = 2;
  optional bytes description = 3;
  reserved 4 to 10;
  optional Size size = 11;
}