# Runs io.github.adamw7.tools.data.SampleApp as a run-to-completion Job.
# SampleApp is a batch CLI (read CSV -> check column uniqueness -> log -> exit),
# so a Job is the correct primitive, not a Deployment.
#
# Uses the tools-k8s image (built from k8s/Dockerfile), which repackages the
# assembly fat jar into a runnable flat classpath and logs to stdout, so the
# result shows up directly in `kubectl logs`. The two positional args are the
# CSV path (mounted from the ConfigMap at /data) and the column to check.
apiVersion: batch/v1
kind: Job
metadata:
  name: tools-uniqueness-check
  labels:
    app.kubernetes.io/name: tools
    app.kubernetes.io/component: uniqueness-check
spec:
  backoffLimit: 1
  ttlSecondsAfterFinished: 600
  # Bound total runtime so a wedged run can never linger; the check finishes in
  # well under a second, 300s is a generous ceiling that also covers image pull.
  activeDeadlineSeconds: 300
  template:
    metadata:
      labels:
        app.kubernetes.io/name: tools
        app.kubernetes.io/component: uniqueness-check
    spec:
      restartPolicy: Never
      # The batch check never talks to the Kubernetes API, so drop its token.
      automountServiceAccountToken: false
      # Pod-level context satisfies the "restricted" Pod Security Standard:
      # run as the image's non-root UID with the default seccomp profile.
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        runAsGroup: 10001
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: uniqueness-check
          image: tools-k8s:local
          imagePullPolicy: IfNotPresent
          args: ["/data/people.csv", "country"]
          volumeMounts:
            - name: sample-data
              mountPath: /data
              readOnly: true
            # Writable scratch for the JVM (java.io.tmpdir) under a read-only root.
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: sample-data
          configMap:
            name: tools-sample-data
        - name: tmp
          emptyDir: {}
